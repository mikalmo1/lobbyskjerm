<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tælet Kultursal · Infoskjerm</title>

<!--
  Infoskjerm for lobbyskjermen (Samsung S6/MagicInfo, 1920×1080).
  Design: «kinematisk» retning fra Claude Design-leveransen (kongelilla fra
  taletkultursal.no + gull-aksent, Oswald/Barlow). Skrevet for GAMMEL nettleser
  (~Chromium 56): ingen grid, flex-gap, inset, aspect-ratio, clamp().

  Innhold (hentes dynamisk):
    · Tælet Kultursal-program  – åpent API på taletkultursal.no
    · Bygdekino                – bilder fra plakater/-mappa (contents-API) og
                                 videoer fra release «infoskjerm» (assets)
    · «Selbu i dag»-slide      – dashboard med fire felt:
        · Været i Selbu        – api.met.no (Yr); også kompakt chip i bunnlinja
        · Neste buss           – Entur JourneyPlanner v3 (åpent GraphQL-API) fra
                                 Marienborg (NSR:StopPlace:42434) — nærmeste stopp
                                 ved ungdomsskolen med rutetrafikk (linje 430)
        · Beskjeder            – beskjeder.json i repoet (pushes fra Knuten;
                                 kommune/skole-beskjeder, «viktig»-flagg = rød)
    · Visningsstyring          – visning.json i repoet (pushes fra Knuten): hva som
                                 vises og sekunder per slide i to regimer — «skole»
                                 (skoledager i skoletiden, utenom ferier) og «fritid»
                                 (ettermiddag/kveld, helg, ferie). Mangler fila,
                                 vises alt med 12 s per slide.
        · NRK-toppsaker        – de to øverste fra nyheter.json (skjules ved 3 beskjeder)
    · NRK-nyhetsticker         – nyheter.json i repoet (lages av GitHub Action
                                 .github/workflows/nyheter.yml; NRK har ikke CORS,
                                 så feeden hentes server-side og committes)
  Filnavn-konvensjon (plakater/assets): se README.md.
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --purple:      #4a2570;
    --purple-lite: #6a3f9b;
    --purple-deep: #2a1642;
    --ink:         #180e28;
    --gold:        #d8b25f;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ width:100%; height:100%; overflow:hidden; background:var(--ink); }
  body{ font-family:'Barlow', Arial, sans-serif; -webkit-font-smoothing:antialiased; }

  .lag{ position:absolute; top:0; left:0; right:0; bottom:0; }

  /* ===== Kinematisk arrangement-slide ===== */
  #slide{ background:var(--ink); opacity:1; transition:opacity .7s ease; }
  #slide.skjul{ opacity:0; }

  .cine__bg{
    position:absolute; top:-6vh; left:-6vw; right:-6vw; bottom:-6vh;
    width:112vw; height:112vh;
    object-fit:cover;
    -webkit-filter:blur(3.2vh) brightness(.5) saturate(1.05);
            filter:blur(3.2vh) brightness(.5) saturate(1.05);
    opacity:.9;
  }
  .cine__poster{
    position:absolute;
    top:5vh; left:6vw; right:6vw;
    width:88vw; height:55vh;   /* stopper før tekstsonen — brede bannere krasjet med tittelen */
    object-fit:contain;
    object-position:50% 0;     /* anker mot toppen, ikke sentrert nedover */
    filter:drop-shadow(0 2vh 5vh rgba(0,0,0,.6));
  }
  .cine__scrim{
    position:absolute; left:0; right:0; bottom:0;
    height:52vh;
    background:linear-gradient(to top, rgba(15,8,25,.96) 0%, rgba(15,8,25,.86) 26%, rgba(15,8,25,0) 100%);
  }
  .cine__text{ position:absolute; left:6vw; right:6vw; bottom:12vh; }

  /* video + [skjerm]-bilder: full-bleed uten tekst */
  #slide.fullmedia .cine__bg, #slide.fullmedia .cine__scrim, #slide.fullmedia .cine__text{ display:none; }
  #slide.fullmedia .cine__poster{
    top:0; left:0; right:0; bottom:0;
    width:100vw; height:100vh;
    object-position:50% 50%;
    filter:none;
  }
  #video{
    position:absolute; top:0; left:0; right:0; bottom:0;
    width:100vw; height:100vh;
    object-fit:contain;
    background:#000;
  }

  /* ===== Tekstblokker ===== */
  .kicker{
    font-family:'Oswald', sans-serif;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:.28vw;
    font-size:1.5vw;
    color:var(--gold);
    display:flex; align-items:center;
    margin-bottom:2.4vh;
  }
  .kicker__dot{
    display:inline-block;
    width:1.15vw; height:1.15vw;
    margin-right:1vw;
    background:var(--gold);
    -webkit-transform:rotate(45deg); transform:rotate(45deg);
  }
  .title{
    font-family:'Oswald', sans-serif;
    font-weight:600;
    line-height:1.02;
    letter-spacing:.005em;
    color:#fff;
    font-size:4.4vw;
    text-shadow:0 .4vh 3vh rgba(0,0,0,.55);
  }
  .rule{ width:9vw; height:.35vh; margin:3.2vh 0; border-radius:1vh; background:var(--gold); }
  .when{
    font-family:'Barlow', sans-serif;
    font-weight:500;
    font-size:2.05vw;
    line-height:1.15;
    color:#e9e2f2;
  }
  .when b{ font-weight:700; }

  /* inn-animasjon på tekst når slide byttes */
  @keyframes fadeUp{ from{ opacity:0; -webkit-transform:translateY(2vh); transform:translateY(2vh);} to{ opacity:1; -webkit-transform:none; transform:none;} }
  .anim .kicker, .anim .title, .anim .rule, .anim .when{
    -webkit-animation:fadeUp .7s ease both; animation:fadeUp .7s ease both;
  }
  .anim .title{ -webkit-animation-delay:.08s; animation-delay:.08s; }
  .anim .rule{  -webkit-animation-delay:.14s; animation-delay:.14s; }
  .anim .when{  -webkit-animation-delay:.20s; animation-delay:.20s; }

  /* ===== Rolige flater: fallback + vær ===== */
  .calm{ background:linear-gradient(155deg, #56308a 0%, var(--purple) 42%, var(--purple-deep) 100%); }
  .calm:after{
    content:"";
    position:absolute; top:0; left:0; right:0; bottom:0;
    box-shadow:inset 0 0 40vh rgba(0,0,0,.35);
    pointer-events:none;
  }
  .fb{
    position:absolute; top:0; left:0; right:0; bottom:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center;
    padding-bottom:6vh;
  }
  .emblem{
    width:2.6vw; height:2.6vw;
    margin-bottom:4vh;
    border:.35vh solid var(--gold);
    -webkit-transform:rotate(45deg); transform:rotate(45deg);
  }
  .fb__word{ font-family:'Oswald', sans-serif; font-weight:600; color:#fff; font-size:8vw; line-height:.95; letter-spacing:.06em; }
  .fb__sub{ font-family:'Oswald', sans-serif; font-weight:400; color:rgba(255,255,255,.72); text-transform:uppercase; letter-spacing:1.1vw; font-size:2vw; margin-top:1.6vh; }
  .fb__divider{ width:16vw; height:.3vh; margin:5vh 0; background:rgba(255,255,255,.28); }
  .fb__date{ font-family:'Barlow', sans-serif; font-weight:500; color:rgba(255,255,255,.85); font-size:2.2vw; }
  .fb__time{ font-family:'Oswald', sans-serif; font-weight:500; color:#fff; font-size:6vw; line-height:1; letter-spacing:.02em; margin-top:.5vh; }

  /* ===== «Selbu i dag»-slide: vær · buss · beskjeder · NRK =====
     (gammel nettleser: flex uten gap — avstand via margin) */
  #vaer{ opacity:1; transition:opacity .7s ease; }
  #vaer.skjul{ opacity:0; }
  .dash{
    position:absolute; top:0; left:0; right:0; bottom:0;
    padding:5.5vh 5vw 11vh 5vw;
    display:flex; flex-direction:column;
  }
  .dash .kicker{ margin-bottom:3.5vh; }
  .dash__kol{ display:flex; flex:1 1 auto; min-height:0; }
  .dash__venstre{ width:54%; padding-right:3vw; display:flex; flex-direction:column; }
  .dash__hoyre{ width:46%; display:flex; flex-direction:column; }
  .dash__label{
    font-family:'Oswald', sans-serif; font-weight:600;
    text-transform:uppercase; letter-spacing:.22vw;
    font-size:1.05vw; color:var(--gold);
    margin-bottom:1.8vh;
  }

  /* vær (venstre topp) */
  .vaer__naa{ display:flex; align-items:center; margin-bottom:2.5vh; }
  .vaer__naa img{ width:7.5vw; height:7.5vw; }
  .vaer__temp{
    font-family:'Oswald', sans-serif; font-weight:500;
    font-size:6.5vw; line-height:1; color:#fff;
    margin-left:1.5vw;
  }
  .vaer__kol{ display:flex; }
  .vaer__pkt{
    width:9.5vw;
    margin-right:1.2vw;
    padding:1.8vh 0;
    border-radius:1.5vh;
    background:rgba(255,255,255,.08);
    text-align:center;
  }
  .vaer__pkt .n{
    font-family:'Oswald', sans-serif; font-weight:500;
    text-transform:uppercase; letter-spacing:.12vw;
    font-size:1.05vw; color:rgba(255,255,255,.75);
  }
  .vaer__pkt img{ width:3.8vw; height:3.8vw; margin:.8vh 0; }
  .vaer__pkt .t{ font-family:'Oswald', sans-serif; font-weight:600; font-size:1.9vw; color:#fff; }
  .vaer__pkt .r{ font-family:'Barlow', sans-serif; font-weight:600; font-size:1vw; color:#9fc6e8; margin-top:.4vh; min-height:1.3vw; }

  /* buss (venstre bunn) */
  .buss{ margin-top:auto; }
  .buss__rad{
    display:flex; align-items:center;
    padding:1.6vh 0;
    border-bottom:.15vh solid rgba(255,255,255,.14);
  }
  .buss__rad:last-child{ border-bottom:none; }
  .buss__linje{
    min-width:3.4vw; padding:.5vh .6vw; margin-right:1.2vw;
    border-radius:.8vh;
    background:var(--gold); color:var(--ink);
    font-family:'Oswald', sans-serif; font-weight:600;
    font-size:1.55vw; line-height:1.1; text-align:center;
  }
  .buss__mot{
    flex:1 1 auto; min-width:0;
    font-family:'Barlow', sans-serif; font-weight:500;
    font-size:1.7vw; color:#fff;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .buss__tid{
    font-family:'Oswald', sans-serif; font-weight:600;
    font-size:1.8vw; color:#fff;
    margin-left:1.2vw; white-space:nowrap;
  }
  .buss__tid .rt{
    display:inline-block; width:.9vh; height:.9vh; margin-left:.5vw;
    border-radius:50%; background:#7ee08a;
    vertical-align:middle;
  }
  .buss__tom{
    font-family:'Barlow', sans-serif; font-weight:500;
    font-size:1.4vw; color:rgba(255,255,255,.7);
    padding:1.6vh 0;
  }

  /* beskjeder (høyre topp) */
  .besk{
    margin-bottom:2vh; padding:2vh 1.6vw;
    border-radius:1.5vh;
    background:rgba(255,255,255,.09);
    border-left:.4vw solid var(--gold);
  }
  .besk--viktig{ background:#a32638; border-left-color:#fff; }
  .besk__avs{
    font-family:'Oswald', sans-serif; font-weight:600;
    text-transform:uppercase; letter-spacing:.15vw;
    font-size:.95vw; color:var(--gold);
    margin-bottom:.7vh;
  }
  .besk--viktig .besk__avs{ color:rgba(255,255,255,.85); }
  .besk__tit{ font-family:'Oswald', sans-serif; font-weight:600; font-size:2vw; line-height:1.15; color:#fff; }
  .besk__tekst{
    font-family:'Barlow', sans-serif; font-weight:500;
    font-size:1.35vw; line-height:1.35;
    color:rgba(255,255,255,.92);
    margin-top:.8vh;
  }

  /* NRK-toppsaker (høyre bunn) */
  .nrk{ margin-top:auto; }
  .nrk__sak{
    padding:1.5vh 0;
    border-bottom:.15vh solid rgba(255,255,255,.14);
  }
  .nrk__sak:last-child{ border-bottom:none; }
  .nrk__kilde{
    font-family:'Barlow', sans-serif; font-weight:700;
    text-transform:uppercase; letter-spacing:.05vw;
    font-size:.9vw; color:var(--gold);
  }
  .nrk__tit{
    font-family:'Barlow', sans-serif; font-weight:600;
    font-size:1.55vw; line-height:1.25; color:#fff;
    margin-top:.4vh;
  }

  /* ===== Persistent bunnlinje ===== */
  .footer{
    position:absolute; left:0; right:0; bottom:0;
    height:8vh;
    z-index:9;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 3vw 1.2vh 3vw;
    background:none;   /* uttoningen ligger i ::before så den kan være høyere enn tekstlinja */
    pointer-events:none;
  }
  /* Mørk «nedre tredjedel» bak bunnlinja — skiller den fra plakatens egen bunn */
  .footer:before{
    content:"";
    position:absolute; left:0; right:0; bottom:0; top:-5vh;
    z-index:-1;
    background:linear-gradient(to top,
      rgba(12,7,20,.92) 0%,
      rgba(12,7,20,.82) 35%,
      rgba(12,7,20,.45) 68%,
      rgba(12,7,20,0) 100%);
    pointer-events:none;
  }
  .footer__clock{
    font-family:'Barlow', sans-serif;
    font-weight:600;
    font-size:1.5vw;
    color:#fff;
    letter-spacing:.01em;
    text-shadow:0 .2vh 1.2vh rgba(0,0,0,.5);
  }
  .footer__dots{ display:flex; align-items:center; }
  .dot{
    width:1.05vh; height:1.05vh;
    margin-left:1.1vh;
    border-radius:50%;
    background:rgba(255,255,255,.4);
    transition:width .3s ease, background .3s ease;
  }
  .dot.is-active{ width:3.4vh; border-radius:1vh; background:var(--gold); }

  /* ===== Vær-chip i bunnlinja ===== */
  .footer__left{ display:flex; align-items:center; }
  .footer__vaer{ display:flex; align-items:center; margin-left:1.6vw; }
  .footer__vaer .fl{
    font-family:'Barlow', sans-serif; font-weight:500;
    font-size:1.05vw; color:rgba(255,255,255,.82);
    margin-right:.4vw; text-shadow:0 .2vh 1.2vh rgba(0,0,0,.5);
  }
  .footer__vaer img{ width:1.9vw; height:1.9vw; }
  .footer__vaer .ft{
    font-family:'Barlow', sans-serif; font-weight:600;
    font-size:1.5vw; color:#fff; margin-left:.35vw;
    text-shadow:0 .2vh 1.2vh rgba(0,0,0,.5);
  }

  /* ===== NRK-ticker: inline i bunnlinja, mellom vær-chip og prikkene ===== */
  .ticker{
    display:none;                 /* vises av body.ticker-paa når nyheter.json har saker */
    flex:1 1 auto; min-width:0;   /* fyller midten; min-width:0 lar den krympe så uttoning/overflow virker */
    align-items:center;
    height:2.9vh; margin:0 2vw;
    overflow:hidden;
  }
  .ticker-paa .ticker{ display:flex; }
  .ticker__mask{
    position:relative; flex:1 1 auto; min-width:0; height:100%; overflow:hidden;
    -webkit-mask-image:linear-gradient(to right, rgba(0,0,0,0) 0, #000 2.5%, #000 92%, rgba(0,0,0,0) 100%);
            mask-image:linear-gradient(to right, rgba(0,0,0,0) 0, #000 2.5%, #000 92%, rgba(0,0,0,0) 100%);
  }
  .ticker__spor{
    position:absolute; top:0; left:0; height:100%;
    display:flex; align-items:center;
    white-space:nowrap; will-change:transform;
    -webkit-animation:tickerRull linear infinite;
            animation:tickerRull linear infinite;
  }
  .ticker__sak{
    display:inline-flex; align-items:center;
    padding:0 1.5vw;
    font-family:'Barlow', sans-serif; font-weight:500;
    font-size:1.25vw; color:#fff;
    text-shadow:0 .2vh 1vh rgba(0,0,0,.6);
  }
  .ticker__kilde{
    font-family:'Barlow', sans-serif; font-weight:700;
    text-transform:uppercase; letter-spacing:.04vw;
    font-size:.9vw; color:var(--gold); margin-right:.55vw;
    text-shadow:0 .2vh 1vh rgba(0,0,0,.6);
  }
  .ticker__prikk{
    display:inline-block; width:.55vh; height:.55vh; margin:0 1.5vw;
    border-radius:50%; background:rgba(216,178,95,.75);
  }
  @keyframes tickerRull{
    from{ -webkit-transform:translateX(0);      transform:translateX(0); }
    to{   -webkit-transform:translateX(-50%);   transform:translateX(-50%); }
  }
</style>
</head>
<body>

<!-- Arrangement/kino-slide (kinematisk) -->
<div class="lag" id="slide" style="display:none">
  <img class="cine__bg" id="bgimg" alt="">
  <img class="cine__poster" id="bilde" alt="">
  <video id="video" muted playsinline preload="auto" style="display:none"></video>
  <div class="cine__scrim"></div>
  <div class="cine__text" id="tekst">
    <div class="kicker"><span class="kicker__dot"></span><span id="kicker"></span></div>
    <h1 class="title" id="tittel"></h1>
    <div class="rule" id="rule"></div>
    <div class="when" id="dato"></div>
  </div>
</div>

<!-- «Selbu i dag»-slide: vær · buss · beskjeder · NRK -->
<div class="lag calm" id="vaer" style="display:none">
  <div class="dash">
    <div class="kicker"><span class="kicker__dot"></span>Selbu i dag</div>
    <div class="dash__kol">
      <div class="dash__venstre">
        <div class="dash__label">Været i Selbu</div>
        <div class="vaer__naa">
          <img id="vaer-naa-ikon" alt="">
          <div class="vaer__temp" id="vaer-naa-temp"></div>
        </div>
        <div class="vaer__kol" id="vaer-kol"></div>
        <div class="buss">
          <div class="dash__label">Neste buss · Marienborg</div>
          <div id="buss-liste"></div>
        </div>
      </div>
      <div class="dash__hoyre">
        <div id="besk-felt"></div>
        <div class="nrk" id="nrk-felt"></div>
      </div>
    </div>
  </div>
</div>

<!-- Fallback -->
<div class="lag calm" id="fallback">
  <div class="fb">
    <div class="emblem"></div>
    <div class="fb__word">TÆLET</div>
    <div class="fb__sub">Kultursal</div>
    <div class="fb__divider"></div>
    <div class="fb__date" id="fb-date"></div>
    <div class="fb__time" id="fb-time"></div>
  </div>
</div>

<!-- Persistent bunnlinje: klokke · vær · NRK-ticker · prikker (alt på én linje) -->
<div class="footer">
  <div class="footer__left">
    <div class="footer__clock" id="klokke"></div>
    <div class="footer__vaer" id="footer-vaer"></div>
  </div>
  <!-- NRK-ticker: vises kun når nyheter.json har saker (kilde vises inne i teksten) -->
  <div class="ticker" id="ticker">
    <div class="ticker__mask">
      <div class="ticker__spor" id="ticker-spor"></div>
    </div>
  </div>
  <div class="footer__dots" id="dots"></div>
</div>

<script>
/* ================= KONFIG ================= */
var GITHUB_USER = "";                 // auto på *.github.io — overstyr ved behov
var GITHUB_REPO = "";
var PLAKAT_MAPPE = "plakater";
var RELEASE_TAG = "infoskjerm";
var KULTURSAL_API = "https://www.taletkultursal.no/wp-json/tribe/events/v1/events?per_page=12";
var VAER_LAT = 63.2175, VAER_LON = 11.0333;   // Mebonden/Selbu
var VAER_IKON = "https://raw.githubusercontent.com/metno/weathericons/main/weather/svg/";
var SEKUNDER_PER_SLIDE = 12;
var MAKS_VIDEO_SEKUNDER = 600;        // sikkerhetsnett om 'ended' aldri kommer
var MINUTTER_MELLOM_OPPDATERING = 30;
var RELOAD_TIME = 4;                  // full omstart av siden kl. 04
var NYHETER_FIL = "nyheter.json";     // same-origin, lages av GitHub Action
var MIN_MELLOM_NYHETER = 15;          // hvor ofte skjermen henter nyheter.json
var TICKER_PX_PER_SEK = 95;           // rullefart (høyere = raskere)
var ENTUR_API = "https://api.entur.io/journey-planner/v3/graphql";
var ET_CLIENT = "selbukommune-lobbyskjerm";      // påkrevd av Entur (identifiserer oss)
var BUSS_STOPP = "NSR:StopPlace:42434";          // Marienborg — nærmeste stopp med
                                                 // rutetrafikk (linje 430); holdeplassen
                                                 // Bell skole/ungdomsskolen (43628) har
                                                 // ingen avganger i rutedata
var BUSS_ANTALL = 3;                  // avganger vist på sliden
var MIN_MELLOM_BUSS = 5;              // hvor ofte avganger hentes på nytt
var BESKJEDER_FIL = "beskjeder.json"; // same-origin, pushes fra Knuten
var MIN_MELLOM_BESKJEDER = 5;         // beskjeder skal ut raskt
var VISNING_FIL = "visning.json";     // same-origin, pushes fra Knuten (visningsstyring)
var MIN_MELLOM_VISNING = 5;
/* ========================================== */

var DAGER = ["søndag","mandag","tirsdag","onsdag","torsdag","fredag","lørdag"];
var MND = ["januar","februar","mars","april","mai","juni","juli","august","september","oktober","november","desember"];

var alleSlides = [];                  // alt innhold (ufiltrert)
var slides = [];                      // det gjeldende regimet viser
var idx = 0;
var startet = Date.now();
var slideTimer = null;
var sisteNyhetSig = "";               // hindrer restart av rulle-animasjonen når saker er uendret

function detectRepo(){
  if (GITHUB_USER && GITHUB_REPO) return {user:GITHUB_USER, repo:GITHUB_REPO};
  var m = location.hostname.match(/^([^.]+)\.github\.io$/i);
  var seg = location.pathname.split("/").filter(Boolean);
  if (m && seg.length) return {user:m[1], repo:seg[0]};
  return null;
}
function startenAvIdag(){ var d = new Date(); d.setHours(0,0,0,0); return d; }
function parseWpDato(s){ if (!s) return null; var d = new Date(s.replace(" ","T")); return isNaN(d) ? null : d; }
function p2(n){ return (n < 10 ? "0" : "") + n; }

function fmtDato(d, medTid){
  var t = DAGER[d.getDay()] + " " + d.getDate() + ". " + MND[d.getMonth()];
  if (d.getFullYear() !== new Date().getFullYear()) t += " " + d.getFullYear();
  if (medTid) t += " <b>kl. " + d.getHours() + ":" + p2(d.getMinutes()) + "</b>";
  return t;
}
function decodeEntities(s){
  var el = document.createElement("textarea");
  el.innerHTML = s || "";
  return el.value;
}
function pickImage(img){
  if (!img) return null;
  if (img.sizes){
    if (img.sizes["1536x1536"]) return img.sizes["1536x1536"].url;
    if (img.sizes.large) return img.sizes.large.url;
  }
  return img.url || null;
}

/* --- Tælet Kultursal: åpent The Events Calendar-API --- */
function hentKultursal(){
  return fetch(KULTURSAL_API, {cache:"no-store"})
    .then(function(r){ return r.json(); })
    .then(function(j){
      var idag = startenAvIdag();
      return (j.events || []).map(function(ev){
        return {
          media: "bilde",
          kategori: "kultursal",
          kicker: "Tælet Kultursal",
          tittel: decodeEntities(ev.title),
          dato: parseWpDato(ev.start_date),
          medTid: true,
          url: pickImage(ev.image)
        };
      }).filter(function(e){ return e.url && e.dato && e.dato >= idag; })
        .sort(function(a,b){ return a.dato - b.dato; });
    })
    .catch(function(){ return []; });
}

/* --- Bygdekinoen: plakater (contents) + videoer (release-assets) ---
   Filnavn: "2026-09-15 1800 Tittel.jpg" (dato/tid valgfri), "[skjerm]" = full-bleed,
   mp4/webm = video som spilles ferdig. Passert dato = vises ikke. */
function parsePlakatnavn(navn){
  var fullbleed = /\[skjerm\]/i.test(navn);
  navn = navn.replace(/\s*\[skjerm\]\s*/ig," ").replace(/\s+/g," ").trim();
  var m = navn.match(/^(?:(\d{4})-(\d{2})-(\d{2})(?:[ _]+(\d{2})[.:]?(\d{2}))?[ _-]*)?(.*)\.(jpe?g|png|webp|gif|mp4|webm)$/i);
  if (!m) return null;
  var dato = null;
  if (m[1]) dato = new Date(+m[1], +m[2]-1, +m[3], m[4] ? +m[4] : 0, m[5] ? +m[5] : 0);
  var tittel = (m[6] || "").replace(/[_-]+/g," ").replace(/\s+/g," ").trim();
  return {tittel: tittel || navn, dato: dato, harTid: !!m[4],
          erVideo: /^(mp4|webm)$/i.test(m[7]), fullbleed: fullbleed};
}

function _tilSlide(navn, url){
  var p = parsePlakatnavn(navn);
  if (!p) return null;
  if (p.dato && p.dato < startenAvIdag()) return null;
  return {
    media: p.erVideo ? "video" : "bilde",
    kategori: "kino",
    fullbleed: p.fullbleed,
    kicker: "Bygdekinoen i Selbu",
    tittel: p.tittel,
    dato: p.dato,
    medTid: p.harTid,
    url: url
  };
}

function hentPlakater(){
  var repo = detectRepo();
  if (!repo) return Promise.resolve([]);
  var base = "https://api.github.com/repos/" + repo.user + "/" + repo.repo;

  var mappe = fetch(base + "/contents/" + PLAKAT_MAPPE + "?t=" + Date.now(), {cache:"no-store"})
    .then(function(r){ return r.ok ? r.json() : []; })
    .then(function(filer){
      if (!Array.isArray(filer)) return [];
      return filer.map(function(f){ return _tilSlide(f.name, f.download_url); });
    })
    .catch(function(){ return []; });

  var release = fetch(base + "/releases/tags/" + RELEASE_TAG + "?t=" + Date.now(), {cache:"no-store"})
    .then(function(r){ return r.ok ? r.json() : null; })
    .then(function(rel){
      if (!rel || !Array.isArray(rel.assets)) return [];
      return rel.assets.map(function(a){ return _tilSlide(a.name, a.browser_download_url); });
    })
    .catch(function(){ return []; });

  return Promise.all([mappe, release]).then(function(res){
    return res[0].concat(res[1]).filter(Boolean)
      .sort(function(a,b){
        if (a.dato && b.dato) return a.dato - b.dato;
        if (a.dato) return -1;
        if (b.dato) return 1;
        return a.tittel.localeCompare(b.tittel,"nb");
      });
  });
}

/* --- Været i Selbu (api.met.no / Yr) --- */
function _vaerPunkt(ts, naar){
  var best = null, avstand = Infinity;
  for (var i = 0; i < ts.length; i++){
    var d = Math.abs(new Date(ts[i].time) - naar);
    if (d < avstand){ avstand = d; best = ts[i]; }
  }
  if (!best) return null;
  var det = best.data.instant.details;
  var neste = best.data.next_1_hours || best.data.next_6_hours;
  return {
    temp: Math.round(det.air_temperature),
    ikon: neste && neste.summary ? neste.summary.symbol_code : null,
    nedbor: neste && neste.details ? (neste.details.precipitation_amount || 0) : 0,
    tid: new Date(best.time)
  };
}

function hentVaer(){
  var url = "https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=" + VAER_LAT + "&lon=" + VAER_LON;
  return fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(j){
      var ts = j.properties.timeseries;
      if (!ts || !ts.length) return null;
      var naa = Date.now();
      oppdaterVaerChip(_vaerPunkt(ts, naa));   // kompakt chip i bunnlinja
      var imorgen = new Date(); imorgen.setDate(imorgen.getDate() + 1); imorgen.setHours(12,0,0,0);
      var punkter = [
        {navn: "Nå",       p: _vaerPunkt(ts, naa)},
        {navn: null,       p: _vaerPunkt(ts, naa + 6*3600*1000)},
        {navn: null,       p: _vaerPunkt(ts, naa + 12*3600*1000)},
        {navn: "I morgen", p: _vaerPunkt(ts, imorgen.getTime())}
      ].filter(function(x){ return x.p && x.p.ikon; });
      return punkter.length >= 2 ? {media: "vaer", kategori: "dashboard", punkter: punkter} : null;
    })
    .catch(function(){ return null; });
}

function oppdaterVaerChip(p){
  if (!p || !p.ikon) return;
  document.getElementById("footer-vaer").innerHTML =
    '<span class="fl">Selbu</span>' +
    '<img src="' + VAER_IKON + p.ikon + '.svg" alt="">' +
    '<span class="ft">' + p.temp + '°</span>';
}

function tegnVaer(s){
  var naa = s.punkter[0].p;
  document.getElementById("vaer-naa-ikon").src = VAER_IKON + naa.ikon + ".svg";
  document.getElementById("vaer-naa-temp").textContent = naa.temp + "°";
  var h = "";
  for (var i = 1; i < s.punkter.length; i++){
    var x = s.punkter[i], navn = x.navn || ("kl. " + p2(x.p.tid.getHours()));
    h += '<div class="vaer__pkt"><div class="n">' + navn + '</div>' +
         '<img src="' + VAER_IKON + x.p.ikon + '.svg" alt="">' +
         '<div class="t">' + x.p.temp + '°</div>' +
         '<div class="r">' + (x.p.nedbor > 0 ? x.p.nedbor.toFixed(1).replace(".", ",") + " mm" : "") + '</div></div>';
  }
  document.getElementById("vaer-kol").innerHTML = h;
  // resten av dashboardet tegnes ved hver visning så «om X min» alltid er ferskt
  tegnBuss();
  tegnBeskjeder();
  tegnNrkFelt();
}

/* --- Neste buss fra Bell skole/Selbu ungdomsskole (Entur JourneyPlanner v3) ---
   Åpent GraphQL-API med CORS; krever bare ET-Client-Name-headeren. */
var bussAvganger = null;   // null = ikke hentet ennå, [] = hentet men tomt

function hentBuss(){
  var q = '{ stopPlace(id: "' + BUSS_STOPP + '") {' +
          ' estimatedCalls(timeRange: 86400, numberOfDepartures: 10) {' +
          ' realtime expectedDepartureTime' +
          ' destinationDisplay { frontText }' +
          ' serviceJourney { line { publicCode } } } } }';
  fetch(ENTUR_API, {
    method: "POST",
    headers: {"Content-Type": "application/json", "ET-Client-Name": ET_CLIENT},
    body: JSON.stringify({query: q})
  })
  .then(function(r){ return r.json(); })
  .then(function(j){
    var calls = (j && j.data && j.data.stopPlace && j.data.stopPlace.estimatedCalls) || [];
    bussAvganger = calls.map(function(c){
      return {
        tid: new Date(c.expectedDepartureTime),
        linje: (c.serviceJourney && c.serviceJourney.line && c.serviceJourney.line.publicCode) || "",
        mot: (c.destinationDisplay && c.destinationDisplay.frontText) || "",
        rt: !!c.realtime
      };
    });
    tegnBuss();
  })
  .catch(function(){ /* behold forrige liste ved nettverksfeil */ });
}

function fmtBussTid(d){
  var diffMin = Math.round((d - Date.now()) / 60000);
  if (diffMin <= 0) return "nå";
  if (diffMin < 60) return "om " + diffMin + " min";
  var t = "kl. " + d.getHours() + ":" + p2(d.getMinutes());
  if (d.getDate() !== new Date().getDate()) t = "i morgen " + t;
  return t;
}

function tegnBuss(){
  var el = document.getElementById("buss-liste");
  if (bussAvganger === null){ el.innerHTML = ""; return; }
  var grense = Date.now() - 60000;   // vis avganger inntil ett minutt tilbake
  var komm = [];
  for (var i = 0; i < bussAvganger.length && komm.length < BUSS_ANTALL; i++)
    if (bussAvganger[i].tid >= grense) komm.push(bussAvganger[i]);
  if (!komm.length){
    el.innerHTML = '<div class="buss__tom">Ingen avganger neste døgn</div>';
    return;
  }
  var h = "";
  for (i = 0; i < komm.length; i++){
    var a = komm[i];
    h += '<div class="buss__rad">' +
         (a.linje ? '<div class="buss__linje">' + esc(a.linje) + '</div>' : '') +
         '<div class="buss__mot">' + esc(a.mot) + '</div>' +
         '<div class="buss__tid">' + fmtBussTid(a.tid) + (a.rt ? '<span class="rt"></span>' : '') + '</div>' +
         '</div>';
  }
  el.innerHTML = h;
}

/* --- Beskjeder fra kommune/skole (same-origin beskjeder.json, pushes fra Knuten) ---
   Format: {"beskjeder":[{"tittel","tekst","avsender","viktig","fra","til"}]}
   fra/til er valgfrie ISO-datoer; "til" uten klokkeslett gjelder ut dagen. */
var beskjeder = [];

function hentBeskjeder(){
  fetch(BESKJEDER_FIL + "?t=" + Date.now(), {cache: "no-store"})
  .then(function(r){ return r.ok ? r.json() : null; })
  .then(function(j){
    var alle = (j && j.beskjeder) || [];
    var naa = new Date();
    beskjeder = alle.filter(function(b){
      if (!b || !b.tittel) return false;
      if (b.fra && naa < new Date(b.fra)) return false;
      if (b.til){
        var til = new Date(b.til);
        if (String(b.til).length <= 10) til.setHours(23, 59, 59);
        if (naa > til) return false;
      }
      return true;
    }).sort(function(a, b){ return (b.viktig ? 1 : 0) - (a.viktig ? 1 : 0); })
      .slice(0, 3);
    tegnBeskjeder();
    tegnNrkFelt();
  })
  .catch(function(){ /* behold forrige */ });
}

function tegnBeskjeder(){
  var el = document.getElementById("besk-felt");
  if (!beskjeder.length){ el.innerHTML = ""; return; }
  var h = '<div class="dash__label">Beskjeder</div>';
  for (var i = 0; i < beskjeder.length; i++){
    var b = beskjeder[i];
    h += '<div class="besk' + (b.viktig ? ' besk--viktig' : '') + '">' +
         (b.avsender ? '<div class="besk__avs">' + esc(b.avsender) + '</div>' : '') +
         '<div class="besk__tit">' + esc(b.tittel) + '</div>' +
         (b.tekst ? '<div class="besk__tekst">' + esc(b.tekst) + '</div>' : '') +
         '</div>';
  }
  el.innerHTML = h;
}

/* --- NRK-toppsaker på sliden (de to øverste fra nyheter.json) --- */
var nyhetsSaker = [];

function tegnNrkFelt(){
  var el = document.getElementById("nrk-felt");
  if (beskjeder.length >= 3 || !nyhetsSaker.length){ el.innerHTML = ""; return; }
  var h = '<div class="dash__label">Siste fra NRK</div>';
  for (var i = 0; i < Math.min(2, nyhetsSaker.length); i++){
    var s = nyhetsSaker[i];
    h += '<div class="nrk__sak">' +
         (s.kilde ? '<span class="nrk__kilde">' + esc(s.kilde) + '</span>' : '') +
         '<div class="nrk__tit">' + esc(s.tittel) + '</div>' +
         '</div>';
  }
  el.innerHTML = h;
}

/* --- NRK-nyhetsticker (same-origin nyheter.json fra GitHub Action) --- */
function esc(s){
  return String(s == null ? "" : s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function hentNyheter(){
  fetch(NYHETER_FIL + "?t=" + Date.now(), {cache:"no-store"})
    .then(function(r){ return r.ok ? r.json() : null; })
    .then(function(j){
      nyhetsSaker = (j && j.saker) || [];
      tegnNrkFelt();
      byggTicker(nyhetsSaker);
    })
    .catch(function(){ byggTicker([]); });
}

function byggTicker(saker){
  var spor = document.getElementById("ticker-spor");
  if (!saker || !saker.length){          // ingen nyheter: skjul tickeren, footer tilbake til full høyde
    settTicker(false);
    spor.innerHTML = "";
    sisteNyhetSig = "";
    return;
  }
  var sig = saker.map(function(s){ return s.tittel; }).join("|");
  if (sig === sisteNyhetSig) return;     // uendret innhold -> ikke restart rullingen
  sisteNyhetSig = sig;

  var en = "";
  for (var i = 0; i < saker.length; i++){
    var s = saker[i];
    en += '<span class="ticker__sak">';
    if (s.kilde) en += '<span class="ticker__kilde">' + esc(s.kilde) + '</span>';
    en += esc(s.tittel) + '</span><span class="ticker__prikk"></span>';
  }
  spor.innerHTML = en + en;              // to kopier => sømløs løkke ved translateX(-50%)
  settTicker(true);

  var enKopiPx = spor.scrollWidth / 2;   // scrollWidth tvinger reflow -> gyldig bredde
  var sek = Math.max(20, Math.round(enKopiPx / TICKER_PX_PER_SEK));
  spor.style.webkitAnimationDuration = sek + "s";
  spor.style.animationDuration = sek + "s";
}

function settTicker(paa){
  var b = document.body, kl = b.className.replace(/\s*ticker-paa/g, "");
  b.className = paa ? (kl + " ticker-paa") : kl;
}

/* --- Visningsstyring (same-origin visning.json fra Knuten) ---
   To regimer: «skole» = man–fre innenfor skoletiden, utenom ferier/fridager;
   alt annet = «fritid». Regimet styrer hvilke kategorier som vises og hvor
   lenge hver slide står. Uten fil: alt vises, SEKUNDER_PER_SLIDE gjelder. */
var visning = null;
var sisteRegime = null;

function hentVisning(){
  fetch(VISNING_FIL + "?t=" + Date.now(), {cache:"no-store"})
    .then(function(r){ return r.ok ? r.json() : null; })
    .then(function(j){
      if (!j) return;
      visning = j;
      sisteRegime = regimeNaa();
      filtrerSlides(false);   // ny innholdsliste tas i bruk fra neste slidebytte
    })
    .catch(function(){ /* behold forrige styring */ });
}

function regimeNaa(){
  if (!visning) return "fritid";
  var n = new Date();
  if (n.getDay() === 0 || n.getDay() === 6) return "fritid";
  var iso = n.getFullYear() + "-" + p2(n.getMonth() + 1) + "-" + p2(n.getDate());
  var ferier = visning.ferier || [];
  for (var i = 0; i < ferier.length; i++)
    if (ferier[i].fra <= iso && iso <= ferier[i].til) return "fritid";
  var kl = p2(n.getHours()) + ":" + p2(n.getMinutes());
  var st = (visning.skoletid && visning.skoletid.start) || "08:00";
  var sl = (visning.skoletid && visning.skoletid.slutt) || "15:30";
  return (st <= kl && kl < sl) ? "skole" : "fritid";
}

function innholdPaa(kategori){
  if (!visning || !kategori) return true;
  var r = visning.regimer && visning.regimer[regimeNaa()];
  if (!r || !r.innhold) return true;
  return r.innhold[kategori] !== false;
}

function sekunderPerSlide(){
  var r = visning && visning.regimer && visning.regimer[regimeNaa()];
  var sek = r && Number(r.sekunder);
  return (sek >= 5 && sek <= 60) ? sek : SEKUNDER_PER_SLIDE;
}

/* Hovedskjerm-modus: «Selbu i dag» står fast, og resten av innholdet spilles som
   ett innslag (én runde gjennom lista) hvert `innslag_min`. minutt. */
function hovedskjermConf(){
  var r = visning && visning.regimer && visning.regimer[regimeNaa()];
  if (!r || !r.hovedskjerm) return null;
  var min = Number(r.innslag_min);
  return {min: (min >= 5 && min <= 180) ? min : 30};
}

function finnDashIdx(){
  for (var i = 0; i < slides.length; i++)
    if (slides[i].media === "vaer") return i;
  return -1;
}

function filtrerSlides(tegnOm){
  var ny = [];
  for (var i = 0; i < alleSlides.length; i++)
    if (innholdPaa(alleSlides[i].kategori)) ny.push(alleSlides[i]);
  slides = ny;
  if (idx >= slides.length) idx = 0;
  if (!tegnOm) return;
  var vid = document.getElementById("video");
  var videoSpiller = vid.style.display !== "none" && !vid.paused && !vid.ended;
  if (!videoSpiller) visSlide(slides.length ? idx : -1);
}

function sjekkRegime(){
  // Bytter skjermen regime (kl. 08:00/15:30, ny dag), filtrer og tegn om straks.
  var r = regimeNaa();
  if (r === sisteRegime) return;
  sisteRegime = r;
  innslagAktiv = false;
  sisteInnslag = Date.now();
  filtrerSlides(true);
}

/* --- rotasjon --- */
function planleggNeste(sek){
  clearTimeout(slideTimer);
  slideTimer = setTimeout(nesteSlide, sek * 1000);
}

function _vis(el, synlig){ el.style.display = synlig ? "block" : "none"; }

function visSlide(n){
  var s = slides[n];
  var slideEl = document.getElementById("slide");
  var vaerEl = document.getElementById("vaer");
  var fb = document.getElementById("fallback");
  var img = document.getElementById("bilde");
  var bg = document.getElementById("bgimg");
  var vid = document.getElementById("video");

  if (!s){
    _vis(slideEl, false); _vis(vaerEl, false); _vis(fb, true);
    planleggNeste(sekunderPerSlide());
    return;
  }

  // Hovedskjerm-modus: står dashboardet allerede framme, tegn bare dataene på
  // nytt (ferske busstider/beskjeder) uten fade — ellers blinker skjermen ved
  // hver «fornyelse» av samme slide.
  if (s.media === "vaer" && vaerEl.style.display !== "none" && !vaerEl.classList.contains("skjul")){
    tegnVaer(s);
    tegnDots(n);
    planleggNeste(sekunderPerSlide());
    return;
  }
  _vis(fb, false);
  slideEl.classList.add("skjul");
  vaerEl.classList.add("skjul");

  setTimeout(function(){
    vid.pause(); vid.onended = null; vid.removeAttribute("src"); vid.load();
    img.onload = null; img.onerror = null;

    if (s.media === "vaer"){
      _vis(slideEl, false);
      tegnVaer(s);
      _vis(vaerEl, true);
      vaerEl.classList.remove("skjul");
      planleggNeste(sekunderPerSlide());
      forhandslastNeste(n);
    } else if (s.media === "video"){
      _vis(vaerEl, false);
      slideEl.classList.add("fullmedia");
      img.style.display = "none"; bg.style.display = "none";
      vid.style.display = "block";
      vid.onended = function(){ nesteSlide(); };
      vid.onerror = function(){ nesteSlide(); };
      vid.src = s.url;
      vid.play().catch(function(){ planleggNeste(sekunderPerSlide()); });
      planleggNeste(MAKS_VIDEO_SEKUNDER);
      _vis(slideEl, true);
      slideEl.classList.remove("skjul");
      forhandslastNeste(n);
    } else {
      _vis(vaerEl, false);
      slideEl.classList.toggle("fullmedia", !!s.fullbleed);
      vid.style.display = "none";

      // Fade først inn når bildet er ferdig lastet, så tekst og bilde alltid
      // kommer i takt (en <img> viser det gamle bildet til det nye er klart).
      // Lastevakt: en treg/død URL skal ikke fryse rotasjonen.
      var vist = false;
      var lastevakt = null;
      var visNaa = function(){
        if (vist) return;
        vist = true;
        clearTimeout(lastevakt);
        if (s.fullbleed){
          bg.style.display = "none";
        } else {
          bg.src = s.url;
          bg.style.display = "block";
          document.getElementById("kicker").textContent = s.kicker;
          document.getElementById("tittel").textContent = s.tittel;
          document.getElementById("dato").innerHTML = s.dato ? fmtDato(s.dato, s.medTid) : "";
          _vis(document.getElementById("rule"), true);
          // restart inn-animasjonen på teksten
          var tekst = document.getElementById("tekst");
          tekst.classList.remove("anim");
          void tekst.offsetWidth;
          tekst.classList.add("anim");
        }
        _vis(slideEl, true);
        slideEl.classList.remove("skjul");
        planleggNeste(sekunderPerSlide());
        forhandslastNeste(n);
      };
      img.onload = visNaa;
      img.onerror = function(){
        if (vist) return;
        vist = true;
        clearTimeout(lastevakt);
        nesteSlide();
      };
      lastevakt = setTimeout(visNaa, 2500);
      img.src = s.url;
      img.style.display = "block";
    }
    tegnDots(n);
  }, 700);
}

/* Forhåndslast neste bilde i rotasjonen (hopper over vær/video) — da ligger
   det i cache før slidebyttet, og lasteventingen i visSlide blir umerkelig. */
function forhandslastNeste(n){
  for (var i = 1; i < slides.length; i++){
    var s = slides[(n + i) % slides.length];
    if (s.media === "bilde"){ (new Image()).src = s.url; return; }
  }
}

function tegnDots(n){
  var d = document.getElementById("dots");
  if (slides.length < 2 || slides.length > 20){ d.innerHTML = ""; return; }
  var h = "";
  for (var i = 0; i < slides.length; i++)
    h += '<span class="dot' + (i === n ? " is-active" : "") + '"></span>';
  d.innerHTML = h;
}

var innslagAktiv = false;             // spiller vi et innslag akkurat nå?
var sisteInnslag = Date.now();        // forrige innslag startet (start = «nå» så
                                      // første innslag kommer ETTER intervallet)

function nesteSlide(){
  if (!slides.length){ visSlide(-1); return; }

  var hs = hovedskjermConf();
  var dashIdx = hs ? finnDashIdx() : -1;
  if (hs && dashIdx !== -1){
    if (innslagAktiv){
      // Midt i et innslag: fortsett runden til vi er tilbake på dashboardet.
      idx = (idx + 1) % slides.length;
      if (idx === dashIdx) innslagAktiv = false;
      visSlide(idx);
      return;
    }
    if (slides.length > 1 && Date.now() - sisteInnslag >= hs.min * 60000){
      // På tide med et innslag: start runden på sliden etter dashboardet.
      innslagAktiv = true;
      sisteInnslag = Date.now();
      idx = (dashIdx + 1) % slides.length;
      visSlide(idx);
      return;
    }
    idx = dashIdx;                    // ellers: bli stående på «Selbu i dag»
    visSlide(dashIdx);
    return;
  }

  idx = (idx + 1) % slides.length;
  try { localStorage.setItem("infoskjerm_idx", String(idx)); } catch(e){}
  visSlide(idx);
}

function lastData(){
  Promise.all([hentKultursal(), hentPlakater(), hentVaer()]).then(function(res){
    var ny = res[0].concat(res[1]);
    if (res[2]) ny.push(res[2]);   // «Selbu i dag» sist i runden
    alleSlides = ny;
    filtrerSlides(true);
  });
}

/* --- klokke + vedlikehold --- */
function oppdaterKlokke(){
  var n = new Date();
  var dag = DAGER[n.getDay()] + " " + n.getDate() + ". " + MND[n.getMonth()];
  var tid = p2(n.getHours()) + ":" + p2(n.getMinutes());
  document.getElementById("klokke").textContent = dag + " · " + tid;
  document.getElementById("fb-date").textContent = dag;
  document.getElementById("fb-time").textContent = tid;
}

try { idx = parseInt(localStorage.getItem("infoskjerm_idx") || "0", 10) || 0; } catch(e){}

oppdaterKlokke();
setInterval(oppdaterKlokke, 10000);
lastData();
setInterval(lastData, MINUTTER_MELLOM_OPPDATERING * 60 * 1000);
hentNyheter();
setInterval(hentNyheter, MIN_MELLOM_NYHETER * 60 * 1000);
hentBuss();
setInterval(hentBuss, MIN_MELLOM_BUSS * 60 * 1000);
hentBeskjeder();
setInterval(hentBeskjeder, MIN_MELLOM_BESKJEDER * 60 * 1000);
hentVisning();
setInterval(hentVisning, MIN_MELLOM_VISNING * 60 * 1000);
setInterval(sjekkRegime, 60000);   // fanger regime-skiftene (kl. 08/15:30, ny dag)
setInterval(function(){ // nattlig full omstart (minnehygiene på skjermen)
  var n = new Date();
  if (n.getHours() === RELOAD_TIME && Date.now() - startet > 2*3600*1000) location.reload();
}, 60000);
</script>
